<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قيد التطوير - Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background elements */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float 10s infinite ease-in-out;
        }
        .circle-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            right: -100px;
        }
        .circle-2 {
            width: 400px;
            height: 400px;
            bottom: -150px;
            left: -150px;
            animation-duration: 15s;
        }

        .container {
            text-align: center;
            padding: 4rem 3rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
            animation: fadeIn 1.5s ease-out;
            max-width: 90%;
            width: 500px;
            z-index: 10;
        }

        .icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: bounce 3s infinite ease-in-out;
            display: inline-block;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(120deg, #00e4ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 5px 20px rgba(0, 228, 255, 0.2);
            letter-spacing: -1px;
        }

        p {
            font-size: 1.15rem;
            color: #d1d5db;
            font-weight: 400;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: #00e4ff;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 10px rgba(0, 228, 255, 0.5);
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(0.8);
                opacity: 0.4;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
            }
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }
    </style>
</head>

<body>
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    
    <div class="container">
        <div class="icon">🚀</div>
        <h1>قيد التطوير</h1>
        <p>نحن نعمل بجد لإطلاق شيء مميز قريباً.<br>شكراً لزيارتك، يرجى العودة لاحقاً!</p>
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
</body>

</html>
